<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學員線上履歷入口 · 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #F3F1EC;
            --dark: #2D2C29;
            --mid: #7A7870;
            --subtle: #B5B1A8;
            --border: #E6E2D8;
            --accent: #7E9E8A;
            --font: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--dark);
            -webkit-font-smoothing: antialiased;
        }

        /* ===== HERO ===== */
        .hero {
            background: #E8EBE5;
            padding: clamp(52px, 7vw, 88px) clamp(28px, 7vw, 100px) clamp(44px, 6vw, 72px);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 32px;
            flex-wrap: wrap;
        }

        .hero-left {}

        .hero-tag {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 18px;
            display: block;
        }

        .hero-title {
            font-size: clamp(40px, 6vw, 80px);
            font-weight: 700;
            line-height: 1.06;
            letter-spacing: -0.025em;
            color: var(--dark);
        }

        .hero-desc {
            font-size: clamp(12px, 1.3vw, 14px);
            font-weight: 400;
            color: var(--mid);
            line-height: 1.7;
            margin-top: 20px;
            max-width: 320px;
        }

        .hero-right {
            text-align: right;
        }

        .hero-num {
            font-size: clamp(52px, 8vw, 96px);
            font-weight: 300;
            line-height: 1;
            letter-spacing: -0.04em;
            color: var(--dark);
            opacity: 0.25;
        }

        .hero-num-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--mid);
            letter-spacing: 0.06em;
            margin-top: 6px;
        }

        /* ===== SEPARATOR ===== */
        .sep {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 clamp(28px, 7vw, 100px);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            height: 48px;
        }

        .sep-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--subtle);
            flex-shrink: 0;
        }

        .sep-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ===== LIST ===== */
        .list {
            padding: 0 clamp(28px, 7vw, 100px);
        }

        /* ===== STRIP ===== */
        .strip {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 22px 0;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: inherit;
            position: relative;
            border-radius: 0;
            transition: background 0.25s ease, padding 0.25s ease;
            margin: 0 calc(-1 * clamp(28px, 7vw, 100px));
            padding-left: clamp(28px, 7vw, 100px);
            padding-right: clamp(28px, 7vw, 100px);
            opacity: 0;
            animation: fadeIn 0.35s ease forwards;
        }

        .strip:first-child { border-top: 1px solid var(--border); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-8px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .strip:hover {
            background: var(--strip-color, #F0E8E5);
            padding-left: calc(clamp(28px, 7vw, 100px) + 6px);
        }

        /* Left meta: number + dot */
        .strip-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            width: 56px;
        }

        .strip-num {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--subtle);
            width: 20px;
            flex-shrink: 0;
        }

        .strip-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--strip-color, #ccc);
            flex-shrink: 0;
            transition: transform 0.25s cubic-bezier(0.34, 1.5, 0.64, 1);
        }

        .strip:hover .strip-dot {
            transform: scale(1.5);
        }

        /* Name + URL column */
        .strip-center {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .strip-name {
            font-size: clamp(20px, 2.5vw, 28px);
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--dark);
            line-height: 1.2;
            transition: letter-spacing 0.25s ease;
        }

        .strip:hover .strip-name {
            letter-spacing: -0.01em;
        }

        .strip-url {
            font-size: 11px;
            color: var(--subtle);
            letter-spacing: 0.01em;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            margin-top: 0;
            transition: max-height 0.22s ease, opacity 0.22s ease, margin-top 0.22s ease;
        }

        .strip:hover .strip-url {
            max-height: 20px;
            opacity: 1;
            margin-top: 3px;
        }

        /* Dashed rule */
        .strip-rule {
            flex: 1;
            border-bottom: 1px dashed var(--border);
            margin: 0 20px;
            transition: border-color 0.25s ease;
        }

        .strip:hover .strip-rule {
            border-color: var(--accent);
            opacity: 0.4;
        }

        /* Right link */
        .strip-link {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            color: var(--accent);
            flex-shrink: 0;
            transition: gap 0.22s ease;
        }

        .strip:hover .strip-link {
            gap: 10px;
        }

        .strip-arrow {
            font-size: 14px;
            transition: transform 0.22s ease;
        }

        .strip:hover .strip-arrow {
            transform: translateX(3px);
        }

        /* ===== FOOTER ===== */
        .footer {
            padding: 24px clamp(28px, 7vw, 100px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--subtle);
            border-top: 1px solid var(--border);
            margin-top: 8px;
        }

        /* ===== REDUCED MOTION ===== */
        @media (prefers-reduced-motion: reduce) {
            .strip { animation: none; opacity: 1; }
            .strip:hover { padding-left: clamp(28px, 7vw, 100px); }
            .strip-dot, .strip-name, .strip-link, .strip-arrow { transition: none; }
        }

        /* ===== MOBILE ===== */
        @media (max-width: 560px) {
            .hero { flex-direction: column; align-items: flex-start; }
            .hero-right { text-align: left; }
            .strip-rule { display: none; }
            .strip-link span:not(.strip-arrow) { display: none; }
        }
    </style>
</head>
<body>

<header class="hero">
    <div class="hero-left">
        <span class="hero-tag">數位辦公與 AI 應用培訓班 · 2026</span>
        <h1 class="hero-title">學員<br>線上履歷</h1>
        <p class="hero-desc">13 位結業學員的個人線上履歷，<br>涵蓋數位工作流程與 AI 工具應用實作成果。</p>
    </div>
    <div class="hero-right">
        <div class="hero-num">13</div>
        <div class="hero-num-label">位結業學員</div>
    </div>
</header>

<div class="sep">
    <span class="sep-label">All Members</span>
    <div class="sep-line"></div>
</div>

<main class="list" id="list"></main>

<footer class="footer">
    <span>學員線上履歷目錄 · 2026</span>
    <span>共 13 位</span>
</footer>

<script>
const MEMBERS = [
    { name: "王國鎮", url: "https://wangguojen-alt.github.io/pop/" },           // 王4
    { name: "吳佩靜", url: "https://cathywu0829-svg.github.io/portfolion/" },   // 吳7 佩8
    { name: "吳慧華", url: "https://wu2136tr-coder.github.io/portfolio/" },     // 吳7 慧15
    { name: "陳屯櫻", url: "https://chentoing-svg.github.io/pottfolio/" },      // 陳11 屯4
    { name: "張雅華", url: "https://810404.github.io/portfolio/" },             // 張11 雅12
    { name: "葉奇昌", url: "https://jkes48822789-cmyk.github.io/Portfolio/" },  // 葉12 奇8
    { name: "黃翊珍", url: "https://hijcyoyi.github.io/bp6/" },                 // 黃12 翊11
    { name: "黃凱群", url: "https://b95305019-coder.github.io/portfolio/" },    // 黃12 凱12
    { name: "鄭雅蓁", url: "https://fioncheng889-ship-it.github.io/portfolio3/" }, // 鄭15
    { name: "鍾淳依", url: "https://tong03020302-alt.github.io/tong/" },        // 鍾17 淳11
    { name: "謝惠貞", url: "https://pda.104.com.tw/profile/share/a6ghEbVW8nVcFQnaesoK5hHlVdlRSwmi" }, // 謝17 惠12
    { name: "魏嬿珊", url: "https://a20623077.github.io/Portfolio/" },          // 魏18
    { name: "譚久平", url: "https://tanjiuping0225-prog.github.io/portfolio/" }, // 譚19
];

const COLORS = [
    '#F0E8E5', '#E5EDEA', '#E5EAF0', '#F0EDE5', '#EBE5F0',
    '#E5F0EB', '#F0E8EA', '#E5EBF0', '#EBF0E5', '#F0EBE5',
    '#E5EDF0', '#EEE5F0', '#F0EEE5',
];

const list = document.getElementById('list');

MEMBERS.forEach((m, i) => {
    const color = COLORS[i % COLORS.length];
    const num = String(i + 1).padStart(2, '0');

    const a = document.createElement('a');
    a.className = 'strip';
    a.href = m.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.style.setProperty('--strip-color', color);
    a.style.animationDelay = `${i * 0.035}s`;

    a.innerHTML = `
        <div class="strip-meta">
            <span class="strip-num">${num}</span>
            <span class="strip-dot"></span>
        </div>
        <div class="strip-center">
            <div class="strip-name">${m.name}</div>
            <div class="strip-url">${new URL(m.url).hostname}</div>
        </div>
        <div class="strip-rule"></div>
        <div class="strip-link">
            <span>查看線上履歷</span>
            <span class="strip-arrow">→</span>
        </div>
    `;

    list.appendChild(a);
});
</script>

</body>
</html>
